<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NOC Utilities{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='wiki.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="NOC" class="logo">
                <span>{% block nav_brand %}NOC Utilities{% endblock %}</span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">Главная</a>
                {% if logged_in %}
                <a href="/admin" class="nav-link">⚙️ Админка</a>
                <a href="/logout" class="nav-link nav-link-logout">Выход</a>
                {% else %}
                <a href="/login" class="nav-link">⚙️ Админ-панель</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="main-container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
